// 依 id 快速查詢品項所屬分類(即使日後菜單異動,舊訂單仍可對照到當時的分類)
const MENU_BY_ID = Object.fromEntries(MENU.map((m) => [m.id, m]));
const CAT_LABEL = Object.fromEntries(CATS.map((c) => [c.id, c.label]));

// 有些品項(茶飲、拿鐵)可以選冰或熱,點餐畫面會把它們拆成兩個可各自加減的選項。
// 這個函式把 MENU 展開成「含冰/熱變體」的完整對照表,讓購物車、結帳等邏輯不用另外處理。
function buildMenuById() {
  const map = {};
  MENU.forEach((m) => {
    if (m.temp) {
      map[`${m.id}__ice`] = { ...m, id: `${m.id}__ice`, name: `${m.name} · 冰` };
      map[`${m.id}__hot`] = { ...m, id: `${m.id}__hot`, name: `${m.name} · 熱` };
    } else {
      map[m.id] = m;
    }
  });
  return map;
}

// 結帳彙總:計算總營收、總份數,並依分類、品項細分統計
function computeCheckoutSummary(orders) {
  const catTotals = {};
  let total = 0;
  let itemCount = 0;
  orders.forEach((o) => {
    (o.items || []).forEach((it) => {
      const baseId = it.id.split('__')[0]; // 冰/熱變體要對回原始品項才查得到分類
      const menuItem = MENU_BY_ID[baseId];
      const catId = menuItem ? menuItem.cat : 'other';
      const revenue = it.price * it.qty;
      total += revenue;
      itemCount += it.qty;
      if (!catTotals[catId]) catTotals[catId] = { revenue: 0, qty: 0, items: {} };
      catTotals[catId].revenue += revenue;
      catTotals[catId].qty += it.qty;
      if (!catTotals[catId].items[it.id]) catTotals[catId].items[it.id] = { name: it.name, qty: 0, revenue: 0 };
      catTotals[catId].items[it.id].qty += it.qty;
      catTotals[catId].items[it.id].revenue += revenue;
    });
  });
  return { total, itemCount, orderCount: orders.length, catTotals };
}

// 依訂單內每個品項的狀態,推算整筆訂單的彙總狀態(全部完成才算完成、有任何一項在做就算製作中)
function orderStatus(order) {
  const statuses = (order.items || []).map((it) => it.status || 'pending');
  if (statuses.length === 0) return 'pending';
  if (statuses.every((s) => s === 'done')) return 'done';
  if (statuses.some((s) => s === 'preparing' || s === 'done')) return 'preparing';
  return 'pending';
}

/* ---------------------------------------------------------------
   歷史紀錄:結束營業清空訂單前,先把當天的訂單封存起來,
   之後可以在「歷史紀錄」頁籤依日期查詢當天營收與明細。
--------------------------------------------------------------- */
function todayKey() {
  const now = new Date();
  return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
}

async function archiveDay(orders) {
  if (!orders || orders.length === 0) return true;
  const dateKey = todayKey();
  try {
    const daySnap = await get(ref(db, `history/${dateKey}`));
    const existing = daySnap.val();
    const mergedOrders = existing ? [...existing.orders, ...orders] : orders;
    await set(ref(db, `history/${dateKey}`), {
      date: dateKey,
      archivedAt: new Date().toISOString(),
      orders: mergedOrders,
    });
    return true;
  } catch (e) {
    console.error('封存歷史紀錄失敗:', e);
    return false;
  }
}

async function getHistoryList() {
  const snap = await get(ref(db, 'history'));
  const val = snap.val() || {};
  return Object.values(val).sort((a, b) => b.date.localeCompare(a.date));
}

        .filter((o) => o.roomId === roomId && !o.closed)
        .map((o) => o.tableId);
      setOccupiedIds(occ);
    };
    if (typeof subscribeOrders === 'function') {
      const unsubscribe = subscribeOrders(applyOrders, () => {});
      return () => unsubscribe && unsubscribe();
    }
    let cancelled = false;
    let timer;
    const poll = () => {
      loadOrders().then((list) => { if (!cancelled) applyOrders(list); }).catch(() => {});
      timer = setTimeout(poll, 5000);
    };
    poll();
    return () => { cancelled = true; clearTimeout(timer); };
  }, [roomId]);

  return (
    <div className="max-w-2xl mx-auto px-5 py-6">
      <button onClick={onBack} className="flex items-center gap-1.5 mb-5" style={{ color: 'var(--olive)', fontFamily: 'var(--font-utility)', fontSize: 12.5 }}>
        <ArrowLeft size={14} /> 回到平面圖

      </div>
      <p style={{ fontFamily: 'var(--font-body)', fontSize: 13, color: '#8a7e6f' }} className="mb-1">點選您實際坐的那一桌</p>
      {occupiedIds.length > 0 && (

          橘色代表這桌目前還有尚未結帳的訂單

function OrderScreen({ roomId, tableId, seatNote, cart, setCart, activeOrderId, onBack, onSwitchTable, onOrdered }) {
  const room = roomById[roomId];
  const seatLabel = tableId ? `${room.name} · ${tableId}` : room.name;
  const [activeCat, setActiveCat] = useState('pizza');
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [note, setNote] = useState('');
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState('');
  const [switchOpen, setSwitchOpen] = useState(false);
  const menuById = buildMenuById();

  // 切換到別桌時,清掉這一桌專屬的暫存狀態(備註草稿、開著的購物車、錯誤訊息)
  useEffect(() => {
    setNote('');
    setDrawerOpen(false);
    setError('');
  }, [roomId, tableId]);

  const add = (id) => setCart((c) => ({ ...c, [id]: (c[id] || 0) + 1 }));
  const remove = (id) => setCart((c) => ({ ...c, [id]: Math.max(0, (c[id] || 0) - 1) }));

  const totalQty = Object.values(cart).reduce((s, q) => s + q, 0);
  const totalPrice = Object.entries(cart).reduce((s, [id, q]) => s + (menuById[id] ? menuById[id].price * q : 0), 0);

  const submitOrder = async () => {
    setSubmitting(true);
    setError('');
    try {
      const newItems = Object.entries(cart)
        .filter(([id, q]) => q > 0 && menuById[id])
        .map(([id, q]) => ({
          id, name: menuById[id].name, price: menuById[id].price, qty: q, status: 'pending',
        }));
      if (newItems.length === 0) {
        setError('購物車是空的,請先加點餐點');
        setSubmitting(false);
        return;
      }

      const existing = await loadOrders();
      let resultOrder;
      let merged = false;

      // 直接以資料庫裡的實際資料判斷:這一桌(roomId+tableId)是否已經有一張「尚未結帳」的訂單。
      // 這樣不管是重新整理頁面、切換分頁、還是換其他裝置操作,都能準確合併到同一張單,
      // 不再依賴瀏覽器暫存的 activeOrderId(那個只是用來顯示「加點中」提示用的)。
      const targetIdx = existing.findIndex((o) => o.roomId === roomId && o.tableId === tableId && !o.closed);
      if (targetIdx !== -1) {
        // 這桌已經有進行中的訂單,把新點的餐點加進去(視為新的一批,狀態各自從待處理開始)
        const target = existing[targetIdx];
        const mergedItems = [...target.items, ...newItems];
        resultOrder = {
          ...target,
          items: mergedItems,
          note: note ? (target.note ? `${target.note} / ${note}` : note) : target.note,
          total: mergedItems.reduce((s, i) => s + i.price * i.qty, 0),
          updatedAt: new Date().toISOString(),
        };
        const updated = existing.map((o, i) => (i === targetIdx ? resultOrder : o));
        const saved = await saveOrders(updated);
        if (!saved) throw new Error('儲存失敗');
        merged = true;
      } else {
        // 沒有進行中的訂單(第一次點餐,或原訂單已經結帳),建立新訂單
        resultOrder = {
          id: `ord_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`,
          roomId, roomName: room.name, tableId, seatLabel, seatNote: seatNote || '',
          items: newItems, note, total: newItems.reduce((s, i) => s + i.price * i.qty, 0),
          status: 'pending', closed: false, createdAt: new Date().toISOString(),
        };
        const updated = [resultOrder, ...existing];
        const saved = await saveOrders(updated);
        if (!saved) throw new Error('儲存失敗');
      }

      setCart({});
      setNote('');
      setDrawerOpen(false);
      onOrdered(resultOrder, merged);
    } catch (e) {
      console.error('送出訂單失敗:', e);
      let detail = '';
      if (e) {
        if (typeof e === 'string') detail = e;
        else if (e.message) detail = e.message;
        else { try { detail = JSON.stringify(e); } catch (_) { detail = String(e); } }
      }
      setError(`送出訂單時發生問題,請再試一次${detail ? `(${detail})` : ''}`);
    } finally {
      setSubmitting(false);
    }
  };

  return (
    <div className="pb-28">
      <div className="max-w-3xl mx-auto px-5 pt-6">
        <div className="flex items-center justify-between mb-4 flex-wrap gap-2">
          <button onClick={onBack} className="flex items-center gap-1.5" style={{ color: 'var(--olive)', fontFamily: 'var(--font-utility)', fontSize: 12.5 }}>
            <ArrowLeft size={14} /> 更換座位
          </button>
          <button
            onClick={() => setSwitchOpen(true)}

function AdminScreen({ onBack, onSettle, onAllCleared }) {
  const [orders, setOrders] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState('');
  const [filter, setFilter] = useState('all');
  const [view, setView] = useState('orders'); // orders | checkout | history
  const [clearing, setClearing] = useState(false);
  const [editingOrderId, setEditingOrderId] = useState(null);
  const [noteDraft, setNoteDraft] = useState('');
  const [addItemId, setAddItemId] = useState('');
  const editMenuById = buildMenuById();
  const menuOptions = [];
  CATS.forEach((cat) => {
    MENU.filter((m) => m.cat === cat.id).forEach((m) => {
      if (m.temp) {
        menuOptions.push({ id: `${m.id}__ice`, label: `${cat.label} - ${m.name} · 冰` });
        menuOptions.push({ id: `${m.id}__hot`, label: `${cat.label} - ${m.name} · 熱` });
      } else {
        menuOptions.push({ id: m.id, label: `${cat.label} - ${m.name}` });
      }
    });
  });

  // 即時訂閱:任何裝置(客人手機、其他店員後台)一有異動,這裡會自動收到最新資料
  useEffect(() => {
    setLoading(true);
    const unsubscribe = subscribeOrders(
      (list) => { setOrders(list); setLoading(false); setError(''); },
      (err) => { setError('讀取訂單失敗,請檢查網路連線'); setLoading(false); console.error(err); }
    );
    return () => unsubscribe && unsubscribe();
  }, []);

  const load = useCallback(async () => {
    setLoading(true);
    setError('');
    try {
      const list = await loadOrders();
      setOrders(list);
    } catch (e) {
      setError('讀取訂單失敗,請檢查網路連線');
    } finally {
      setLoading(false);
    }
  }, []);

  const clearAllOrders = async () => {
    setClearing(true);
    setError('');
    try {
      const archived = await archiveDay(orders);
      if (!archived) throw new Error('封存歷史紀錄失敗');
      const ok = await saveOrders([]);
      if (!ok) throw new Error('清空失敗');
      setOrders([]);
      if (onAllCleared) onAllCleared();
    } catch (e) {
      setError('結束營業失敗,請重新整理再試(訂單資料仍保留,尚未清空)');
    } finally {
      setClearing(false);
    }
  };

  const settleOrder = async (order) => {
    const updated = orders.map((o) => (o.id === order.id ? { ...o, closed: true, closedAt: new Date().toISOString() } : o));
    setOrders(updated);
    if (editingOrderId === order.id) stopEdit();
    try {
      const ok = await saveOrders(updated);
      if (!ok) throw new Error('儲存失敗');
      // 結帳完成後,這一桌下次點餐要視為全新訂單,不再併入這張已結帳的訂單
      if (onSettle) onSettle(order.roomId, order.tableId);
    } catch (e) {
      setError('結帳失敗,請重新整理再試');
    }
  };

  const cycleItemStatus = async (orderId, itemIndex) => {
    const oIdx = orders.findIndex((o) => o.id === orderId);
    if (oIdx === -1) return;
    const target = orders[oIdx];
    const items = target.items.map((it, i) => {
      if (i !== itemIndex) return it;
      const current = it.status || 'pending';
      const next = STATUS_FLOW[(STATUS_FLOW.indexOf(current) + 1) % STATUS_FLOW.length];
      return { ...it, status: next };
    });
    const updated = orders.map((o, i) => (i === oIdx ? { ...o, items } : o));
    setOrders(updated);
    try {
      const ok = await saveOrders(updated);
      if (!ok) throw new Error('儲存失敗');
    } catch (e) {
      setError('更新狀態失敗,請重新整理再試');
    }
  };

  const removeItem = async (orderId, itemIndex) => {
    const oIdx = orders.findIndex((o) => o.id === orderId);
    if (oIdx === -1) return;
    const target = orders[oIdx];
    const items = target.items.filter((_, i) => i !== itemIndex);
    // 如果整張訂單的品項都被移除了,乾脆把這張訂單一起刪掉
    const updated = items.length === 0
      ? orders.filter((o) => o.id !== orderId)
      : orders.map((o, i) => (i === oIdx ? { ...o, items, total: items.reduce((s, it) => s + it.price * it.qty, 0) } : o));
    setOrders(updated);
    try {
      const ok = await saveOrders(updated);
      if (!ok) throw new Error('儲存失敗');
    } catch (e) {
      setError('移除品項失敗,請重新整理再試');
    }
  };

  const startEdit = (order) => {
    setEditingOrderId(order.id);
    setNoteDraft(order.note || '');
    setAddItemId('');
  };

  const stopEdit = () => {
    setEditingOrderId(null);
    setNoteDraft('');
    setAddItemId('');
  };

  const updateItemQty = async (orderId, itemIndex, delta) => {
    const oIdx = orders.findIndex((o) => o.id === orderId);
    if (oIdx === -1) return;
    const target = orders[oIdx];
    const items = target.items.map((it, i) => (i === itemIndex ? { ...it, qty: Math.max(1, it.qty + delta) } : it));
    const updated = orders.map((o, i) => (i === oIdx ? { ...o, items, total: items.reduce((s, it) => s + it.price * it.qty, 0) } : o));
    setOrders(updated);
    try {
      const ok = await saveOrders(updated);
      if (!ok) throw new Error('儲存失敗');
    } catch (e) {
      setError('修改數量失敗,請重新整理再試');
    }
  };

  const addItemToOrder = async (orderId) => {
    const menuItem = editMenuById[addItemId];
    if (!menuItem) return;
    const oIdx = orders.findIndex((o) => o.id === orderId);
    if (oIdx === -1) return;
    const target = orders[oIdx];
    const items = [...target.items, { id: menuItem.id, name: menuItem.name, price: menuItem.price, qty: 1, status: 'pending' }];
    const updated = orders.map((o, i) => (i === oIdx ? { ...o, items, total: items.reduce((s, it) => s + it.price * it.qty, 0) } : o));
    setOrders(updated);
    setAddItemId('');
    try {
      const ok = await saveOrders(updated);
      if (!ok) throw new Error('儲存失敗');
    } catch (e) {
      setError('新增品項失敗,請重新整理再試');
    }
  };

  const saveNote = async (orderId) => {
    const oIdx = orders.findIndex((o) => o.id === orderId);
    if (oIdx === -1) return;
    const updated = orders.map((o, i) => (i === oIdx ? { ...o, note: noteDraft } : o));
    setOrders(updated);
    try {
      const ok = await saveOrders(updated);
      if (!ok) throw new Error('儲存失敗');
      stopEdit();
    } catch (e) {
      setError('儲存備註失敗,請重新整理再試');
    }
  };

  const visible =
    filter === 'all' ? orders :
    filter === 'closed' ? orders.filter((o) => o.closed) :
    orders.filter((o) => !o.closed && orderStatus(o) === filter);

  return (
    <div className="max-w-4xl mx-auto px-5 py-6 pb-16">
      <div className="flex items-center justify-between mb-1">
        <button onClick={onBack} className="flex items-center gap-1.5" style={{ color: 'var(--olive)', fontFamily: 'var(--font-utility)', fontSize: 12.5 }}>
          <ArrowLeft size={14} /> 回到點餐畫面
        </button>
        <button onClick={load} className="flex items-center gap-1.5" style={{ color: 'var(--ash)', fontFamily: 'var(--font-utility)', fontSize: 12.5 }}>
          <RefreshCw size={14} className={loading ? 'animate-spin' : ''} /> 重新整理
        </button>
      </div>
      <div className="flex items-center gap-2 mt-4 mb-2">
        <ChefHat size={20} color="var(--ember)" />
        <span style={{ fontFamily: 'var(--font-display)', fontSize: 22, color: 'var(--ash)' }}>後台訂單管理</span>
      </div>

      <div className="flex gap-2 mb-6">
        <button
          onClick={() => setView('orders')}
          className="flex-1 py-2 rounded-full flex items-center justify-center gap-1.5"
          style={{
            fontFamily: 'var(--font-utility)', fontSize: 12.5,
            background: view === 'orders' ? 'var(--ash)' : 'var(--card)',
            color: view === 'orders' ? '#fff' : 'var(--ash)',
            border: '1px solid var(--line)',
          }}
        >
          <ChefHat size={13} /> 訂單管理
        </button>
        <button
          onClick={() => setView('checkout')}
          className="flex-1 py-2 rounded-full flex items-center justify-center gap-1.5"
          style={{
            fontFamily: 'var(--font-utility)', fontSize: 12.5,
            background: view === 'checkout' ? 'var(--ash)' : 'var(--card)',
            color: view === 'checkout' ? '#fff' : 'var(--ash)',
            border: '1px solid var(--line)',
          }}
        >
          <Receipt size={13} /> 結帳
        </button>
        <button
          onClick={() => setView('history')}
          className="flex-1 py-2 rounded-full flex items-center justify-center gap-1.5"
          style={{
            fontFamily: 'var(--font-utility)', fontSize: 12.5,
            background: view === 'history' ? 'var(--ash)' : 'var(--card)',
            color: view === 'history' ? '#fff' : 'var(--ash)',
            border: '1px solid var(--line)',
          }}
        >
          <Archive size={13} /> 歷史紀錄
        </button>
      </div>

      {error && <div className="mb-4 text-sm" style={{ color: 'var(--ember)' }}>{error}</div>}

      {view === 'checkout' ? (
        <CheckoutView orders={orders} onClearAll={clearAllOrders} clearing={clearing} />
      ) : view === 'history' ? (
        <HistoryView />
      ) : (
        <>
      <div className="flex gap-2 mb-6 flex-wrap">
        {[{ id: 'all', label: '全部' }, { id: 'pending', label: '新訂單' }, { id: 'preparing', label: '製作中' }, { id: 'done', label: '已完成' }, { id: 'closed', label: '已結帳' }].map((f) => (
          <button
            key={f.id}
            onClick={() => setFilter(f.id)}
            className="px-3.5 py-1.5 rounded-full"
            style={{
              fontFamily: 'var(--font-utility)', fontSize: 12.5,
              background: filter === f.id ? 'var(--ash)' : 'var(--card)',
              color: filter === f.id ? '#fff' : 'var(--ash)',
              border: '1px solid var(--line)',
            }}
          >
            {f.label}
          </button>
        ))}
      </div>


      {loading ? (
        <div style={{ color: '#a89b8a', fontFamily: 'var(--font-body)' }}>載入中…</div>
      ) : visible.length === 0 ? (
        <div style={{ color: '#a89b8a', fontFamily: 'var(--font-body)' }} className="text-center py-20">目前沒有訂單</div>
      ) : (
        <div className="grid sm:grid-cols-2 gap-4">
          {visible.map((o) => {
            const agg = orderStatus(o);
            const aggSt = STATUS_STYLE[agg];
            const room = roomById[o.roomId];
            const isEditing = editingOrderId === o.id;
            return (
              <div key={o.id} className="rounded-xl p-4" style={{ background: 'var(--card)', border: '1px solid var(--line)', opacity: o.closed ? 0.55 : 1 }}>
                <div className="flex items-center justify-between mb-2">
                  <div className="flex items-center gap-1.5">
                    {room && <room.icon size={14} color={room.tint} />}
                    <span style={{ fontFamily: 'var(--font-utility)', fontSize: 12.5, color: 'var(--ash)' }}>{o.seatLabel || o.roomName}</span>
                    {o.closed && (
                      <span className="px-2 py-0.5 rounded-full" style={{ background: 'var(--limewash)', color: '#8a7e6f', fontFamily: 'var(--font-utility)', fontSize: 10 }}>
                        已結帳
                      </span>
                    )}
                  </div>
                  <div className="flex items-center gap-2">
                    <span style={{ fontFamily: 'var(--font-utility)', fontSize: 11, color: '#a89b8a' }}>
                      {new Date(o.createdAt).toLocaleString('zh-TW', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' })}
                    </span>
                    {!o.closed && (
                      <button
                        onClick={() => (isEditing ? stopEdit() : startEdit(o))}
                        className="px-2 py-0.5 rounded-full"
                        style={{
                          fontFamily: 'var(--font-utility)', fontSize: 10.5,
                          background: isEditing ? 'var(--ash)' : 'var(--limewash)',
                          color: isEditing ? '#fff' : 'var(--ash)',
                        }}
                      >
                        {isEditing ? '完成編輯' : '編輯'}
                      </button>
                    )}
                  </div>
                </div>
                <div className="space-y-1.5 mb-3">
                  {o.items.map((it, i) => {
                    const itSt = STATUS_STYLE[it.status || 'pending'];
                    return (
                      <div key={i} className="flex items-center justify-between gap-2">
                        <div className="min-w-0">
                          <div className="truncate" style={{ fontFamily: 'var(--font-body)', fontSize: 13.5, color: 'var(--ash)' }}>{it.name} × {it.qty}</div>
                          <div style={{ fontFamily: 'var(--font-utility)', fontSize: 11, color: '#8a7e6f' }}>{money(it.price * it.qty)}</div>
                        </div>
                        <div className="flex items-center gap-1.5 shrink-0">
                          {isEditing && (
                            <div className="flex items-center gap-1" style={{ background: 'var(--limewash)', borderRadius: 999, padding: '2px 4px' }}>
                              <button onClick={() => updateItemQty(o.id, i, -1)} className="w-5 h-5 rounded-full flex items-center justify-center" style={{ background: '#fff', color: 'var(--ash)' }} aria-label={`減少 ${it.name} 數量`}>
                                <Minus size={10} />
                              </button>
                              <span style={{ fontFamily: 'var(--font-utility)', fontSize: 11, minWidth: 12, textAlign: 'center' }}>{it.qty}</span>
                              <button onClick={() => updateItemQty(o.id, i, 1)} className="w-5 h-5 rounded-full flex items-center justify-center" style={{ background: 'var(--ember)', color: '#fff' }} aria-label={`增加 ${it.name} 數量`}>
                                <Plus size={10} />
                              </button>
                            </div>
                          )}
                          <button
                            onClick={() => cycleItemStatus(o.id, i)}
                            className="px-2.5 py-1 rounded-full flex items-center gap-1"
                            style={{ background: itSt.bg, color: itSt.fg, border: `1px solid ${itSt.border}`, fontFamily: 'var(--font-utility)', fontSize: 10.5 }}
                          >
                            {(it.status || 'pending') === 'done' ? <CheckCircle2 size={11} /> : <Clock size={11} />}
                            {ITEM_STATUS_LABEL[it.status || 'pending']}
                          </button>
                          {!o.closed && (
                            <button
                              onClick={() => removeItem(o.id, i)}
                              className="w-6 h-6 rounded-full flex items-center justify-center"
                              style={{ background: 'var(--limewash)', color: '#a4463a' }}
                              aria-label={`移除 ${it.name}`}
                            >
                              <Trash2 size={12} />
                            </button>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>

                {isEditing && (
                  <div className="mb-3 space-y-3">
                    <div className="flex gap-2">
                      <select
                        value={addItemId}
                        onChange={(e) => setAddItemId(e.target.value)}
                        className="flex-1 rounded-lg px-2.5 py-2 text-xs"
                        style={{ background: 'var(--limewash)', border: '1px solid var(--line)', fontFamily: 'var(--font-body)', color: 'var(--ash)' }}
                      >
                        <option value="">+ 選擇要新增的品項…</option>
                        {menuOptions.map((opt) => (
                          <option key={opt.id} value={opt.id}>{opt.label}</option>
                        ))}
                      </select>
                      <button
                        onClick={() => addItemToOrder(o.id)}
                        disabled={!addItemId}
                        className="px-3 rounded-lg disabled:opacity-40"
                        style={{ background: 'var(--ember)', color: '#fff', fontFamily: 'var(--font-utility)', fontSize: 12 }}
                      >
                        新增
                      </button>
                    </div>
                    <div>
                      <label className="flex items-center gap-1.5 mb-1" style={{ fontFamily: 'var(--font-utility)', fontSize: 10.5, color: 'var(--olive)' }}>
                        <StickyNote size={11} /> 餐點備註
                      </label>
                      <div className="flex gap-2">
                        <textarea
                          value={noteDraft}
                          onChange={(e) => setNoteDraft(e.target.value)}
                          rows={2}
                          className="flex-1 rounded-lg px-2.5 py-2 text-xs resize-none"
                          style={{ background: '#fff', border: '1px solid var(--line)', fontFamily: 'var(--font-body)', color: 'var(--ash)' }}
                        />
                        <button
                          onClick={() => saveNote(o.id)}
                          className="px-3 rounded-lg"
                          style={{ background: 'var(--ash)', color: '#fff', fontFamily: 'var(--font-utility)', fontSize: 12 }}
                        >
                          儲存
                        </button>
                      </div>
                    </div>
                  </div>
                )}

                {!isEditing && o.seatNote && (
                  <div className="flex items-start gap-1.5 mb-1.5 text-xs" style={{ color: 'var(--ember)', fontFamily: 'var(--font-body)' }}>
                    <MapPin size={12} className="mt-0.5 shrink-0" /> {o.seatNote}
                  </div>
                )}
                {!isEditing && o.note && (
                  <div className="flex items-start gap-1.5 mb-3 text-xs" style={{ color: 'var(--olive)', fontFamily: 'var(--font-body)' }}>
                    <StickyNote size={12} className="mt-0.5 shrink-0" /> {o.note}
                  </div>
                )}
                <div className="flex items-center justify-between pt-2" style={{ borderTop: '1px dashed var(--line)' }}>
                  <span style={{ fontFamily: 'var(--font-display)', fontSize: 16, color: 'var(--ash)' }}>{money(o.total)}</span>
                  <span
                    className="px-3 py-1.5 rounded-full flex items-center gap-1.5"
                    style={{ background: aggSt.bg, color: aggSt.fg, border: `1px solid ${aggSt.border}`, fontFamily: 'var(--font-utility)', fontSize: 12 }}
                  >
                    {agg === 'done' ? <CheckCircle2 size={13} /> : <Clock size={13} />}
                    整單:{STATUS_LABEL[agg]}
                  </span>
                </div>
                {!o.closed && (
                  <button
                    onClick={() => settleOrder(o)}
                    className="w-full mt-3 py-2 rounded-full flex items-center justify-center gap-1.5"
                    style={{ background: 'var(--ash)', color: '#fff', fontFamily: 'var(--font-utility)', fontSize: 12.5 }}
                  >
                    <Receipt size={13} /> 結帳完成
                  </button>
                )}
              </div>
            );
          })}
        </div>
      )}
        </>
      )}
    </div>
  );
}

/* ---------------------------------------------------------------
   App
--------------------------------------------------------------- */

function App() {
  const [page, setPage] = useState('floorplan'); // floorplan | tablepick | seatnote | menu | confirm | adminAuth | admin
  const [roomId, setRoomId] = useState(null);
  const [tableId, setTableId] = useState(null);
  const [seatNote, setSeatNote] = useState('');
  const [cart, setCart] = useState({});
  const [lastOrder, setLastOrder] = useState(null);
  const [lastOrderMerged, setLastOrderMerged] = useState(false);
  // 每一桌各自追蹤「目前還能繼續加點的訂單 id」,key 是 roomId:tableId,這樣店員在不同桌之間切換時不會互相搞混
  const [activeOrderIds, setActiveOrderIds] = useState({});
  const [adminAuthed, setAdminAuthed] = useState(false);
  const tableKey = (r, t) => `${r}:${t || ''}`;
  const currentActiveOrderId = activeOrderIds[tableKey(roomId, tableId)] || null;

  const switchTable = (rId, tId) => {
    setRoomId(rId);
    setTableId(tId);
    setSeatNote('');
    setCart({});
  };

  return (
    <div style={{ minHeight: '100vh', background: 'var(--paper)' }}>
      <style>{`
        :root {
          --ash: #2B2420;
          --ember: #C1440E;
          --olive: #6B7A4F;
          --limewash: #EDE7D9;
          --gold-dark: #9C6B18;
          --paper: #F6F2E9;
          --card: #FFFFFF;
          --line: #E7DFCF;
          --font-display: 'Fraunces', serif;
          --font-body: 'Work Sans', sans-serif;
          --font-utility: 'Space Mono', monospace;
        }
        * { box-sizing: border-box; }
        button { cursor: pointer; }
        button:focus-visible, textarea:focus-visible { outline: 2px solid var(--ember); outline-offset: 2px; }
        @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
      `}</style>

      <header className="sticky top-0 z-30 px-5 py-3.5 flex items-center justify-between" style={{ background: 'rgba(246,242,233,0.9)', backdropFilter: 'blur(6px)', borderBottom: '1px solid var(--line)' }}>
        <Logo />
        {page !== 'admin' && page !== 'adminAuth' && (
          <button
            onClick={() => setPage(adminAuthed ? 'admin' : 'adminAuth')}
            className="text-xs px-3 py-1.5 rounded-full"
            style={{ fontFamily: 'var(--font-utility)', color: 'var(--ash)', border: '1px solid var(--line)' }}
          >
            後台
          </button>
        )}
      </header>

      {page === 'floorplan' && (
        <FloorPlanScreen onPickRoom={(id) => {
          setRoomId(id);
          setSeatNote('');
          const room = roomById[id];
          if (room.noTableSelect) { setTableId(null); setPage('seatnote'); }
          else { setPage('tablepick'); }
        }} />
      )}

      {page === 'tablepick' && (
        <TablePickScreen
          roomId={roomId}
          onBack={() => setPage('floorplan')}
          onPickTable={(rId, tId) => { setRoomId(rId); setTableId(tId); setPage('seatnote'); }}
        />
      )}

      {page === 'seatnote' && (
        <SeatNoteScreen
          roomId={roomId}
          tableId={tableId}
          value={seatNote}
          onChange={setSeatNote}
          onBack={() => {
            const room = roomById[roomId];
            setPage(room && room.noTableSelect ? 'floorplan' : 'tablepick');
          }}
          onContinue={() => setPage('menu')}
        />
      )}

      {page === 'menu' && (
        <OrderScreen
          roomId={roomId}
          tableId={tableId}
          seatNote={seatNote}
          cart={cart}
          setCart={setCart}
          activeOrderId={currentActiveOrderId}
          onSwitchTable={switchTable}
          onBack={() => {
            setPage('seatnote');
            setCart({});
          }}
          onOrdered={(order, merged) => {
            setLastOrder(order);
            setLastOrderMerged(merged);
            setActiveOrderIds((m) => ({ ...m, [tableKey(order.roomId, order.tableId)]: order.id }));
            setPage('confirm');
          }}
        />
      )}

      {page === 'confirm' && lastOrder && (
        <Confirmation order={lastOrder} merged={lastOrderMerged} onNewOrder={() => setPage('menu')} />
      )}

      {page === 'adminAuth' && (
        <AdminAuthScreen
          onSuccess={() => { setAdminAuthed(true); setPage('admin'); }}
          onBack={() => setPage('floorplan')}
        />
      )}

      {page === 'admin' && adminAuthed && (
        <AdminScreen
          onBack={() => setPage('floorplan')}
          onSettle={(rId, tId) => {
            setActiveOrderIds((m) => {
              const key = tableKey(rId, tId);
              if (!(key in m)) return m;
              const next = { ...m };
              delete next[key];
              return next;
            });
          }}
          onAllCleared={() => setActiveOrderIds({})}
        />
      )}
    </div>
  );
}

createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
